version: 1
rules:
  # ── L1: 고빈도 도구 호출 (rate_limit) ────────────────────────────────────────

  - id: s3-rate-limit-tool-calls
    severity: high
    title: S3 동일 도구 고빈도 호출 (Rate Limit)
    message: >-
      30초 슬라이딩 윈도우 내 동일 도구 호출이 임계값(10회)을 초과했습니다.
      에이전트가 단기간에 같은 도구를 반복 호출하는 패턴으로, Denial of Wallet의
      초기 신호입니다. 7회 도달 시 경고, 10회 도달 시 차단을 권고합니다.
    recommendedAction: >-
      세션을 즉시 중단하고 입력 프롬프트를 검토하세요. 에이전트 시스템 프롬프트에
      도구별 최대 호출 횟수/종료 조건을 명시하세요.
    match:
      type: rate_limit
      window_seconds: 30
      max_calls: 10
      warning_threshold: 7
      # tools: []  # 비워두면 모든 도구 대상. 특정 도구만 보려면 지정.

  # ── L2: 동일 인자 연속 호출 (loop_detect) ────────────────────────────────────

  - id: s3-identical-args-loop
    severity: critical
    title: S3 동일 인자 반복 호출 (Infinite Loop)
    message: >-
      동일 도구를 동일 인자로 5회 연속 호출했습니다. 종료 조건 없이 같은 작업을
      반복하는 무한 루프 패턴으로, 즉시 차단이 필요합니다.
    recommendedAction: >-
      세션을 즉시 중단하세요. 에이전트 시스템 프롬프트에 명확한 종료 조건과
      최대 반복 횟수를 추가하고, 동일 결과 재호출 시 stop 룰을 도입하세요.
    match:
      type: loop_detect
      max_identical_consecutive: 5
      # tools: []  # 비워두면 모든 도구 대상.

  # ── L3: 자원 고갈 유발 키워드 (trace_line_regex) ─────────────────────────────

  - id: s3-exhaustion-keyword-prompt
    severity: medium
    title: S3 자원 고갈 키워드 패턴
    message: >-
      프롬프트나 메시지에 "반복해", "완벽할 때까지", "재시도" 같은 종료 조건 부재
      표현이 포함됐습니다. 무한 루프를 유도하는 위험 신호입니다.
    recommendedAction: >-
      입력 프롬프트를 검토하세요. 반복 조건을 명시적으로 제한하고 종료 조건을
      추가하세요(최대 N회, 결과 동일 시 중단 등).
    match:
      type: trace_line_regex
      pattern: '(반복해|완벽할 때까지|무한|endless|infinite[ _-]?loop|retry[ _-]?forever|keep[ _-]?trying|재시도|계속 해|다시 시도)'
