name: Validate scenario and runbook Markdown

on:
  push:
    paths:
      - "scenarios/**"
      - "runbooks/**"
      - "scripts/validate_scenario_md.py"
      - "scripts/__init__.py"
      - "scripts/requirements.txt"
      - ".github/workflows/md-validate.yml"
  pull_request:
    paths:
      - "scenarios/**"
      - "runbooks/**"
      - "scripts/validate_scenario_md.py"
      - "scripts/__init__.py"
      - "scripts/requirements.txt"
      - ".github/workflows/md-validate.yml"

jobs:
  md-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Run Markdown schema validation
        run: python -m scripts.validate_scenario_md
